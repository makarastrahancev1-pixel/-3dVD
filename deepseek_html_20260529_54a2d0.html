<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Базука 3D - Мобильная версия</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background: #000;
      touch-action: manipulation;
    }
    
    canvas {
      display: block;
    }
    
    /* Дисклеймер */
    #disclaimer {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    #disclaimerBox {
      background: #1a1a2e;
      border: 2px solid #ff5500;
      border-radius: 15px;
      padding: clamp(15px, 4vw, 30px);
      max-width: 500px;
      width: 100%;
      text-align: center;
      color: white;
    }
    #disclaimerBox h2 {
      color: #ff5500;
      margin-top: 0;
      font-size: clamp(18px, 5vw, 28px);
    }
    #disclaimerBox p {
      font-size: clamp(12px, 3vw, 14px);
      line-height: 1.6;
      color: #ccc;
      margin: 10px 0;
    }
    
    /* Меню */
    #mainMenu {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    #mainMenu h1 {
      color: #ff5500;
      font-size: clamp(28px, 8vw, 48px);
      margin-bottom: 10px;
      text-shadow: 0 0 30px #ff5500;
    }
    #mainMenu .subtitle {
      color: #aaa;
      margin-bottom: 30px;
      font-size: clamp(12px, 3vw, 16px);
      text-align: center;
    }
    .menuBtn {
      background: #2a2a3e;
      color: white;
      border: 2px solid #ff5500;
      padding: clamp(10px, 3vw, 15px) clamp(30px, 8vw, 50px);
      font-size: clamp(16px, 4vw, 20px);
      border-radius: 30px;
      cursor: pointer;
      margin: 8px;
      width: min(250px, 80%);
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .menuBtn:active {
      background: #ff5500;
      transform: scale(0.95);
    }
    .menuBtn:disabled {
      opacity: 0.4;
      border-color: #555;
      color: #777;
    }
    
    /* Игровые элементы */
    #info {
      position: absolute;
      top: clamp(5px, 2vw, 10px);
      left: clamp(5px, 2vw, 10px);
      color: white;
      background: rgba(0,0,0,0.8);
      padding: clamp(4px, 1.5vw, 8px) clamp(8px, 2vw, 15px);
      border-radius: 8px;
      pointer-events: none;
      font-size: clamp(10px, 2.5vw, 13px);
      border-left: 3px solid #ff5500;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(16px, 4vw, 20px);
      height: clamp(16px, 4vw, 20px);
      pointer-events: none;
      z-index: 100;
    }
    .cross-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(3px, 1vw, 4px);
      height: clamp(3px, 1vw, 4px);
      background: #ff5500;
      border-radius: 50%;
    }
    .cross-h, .cross-v {
      position: absolute;
      background: #ff5500;
    }
    .cross-h { top: 50%; left: 0; width: 100%; height: 1px; transform: translateY(-50%); }
    .cross-v { left: 50%; top: 0; height: 100%; width: 1px; transform: translateX(-50%); }
    
    #ammo {
      position: absolute;
      bottom: clamp(15px, 4vw, 20px);
      right: clamp(15px, 4vw, 20px);
      color: white;
      background: rgba(0,0,0,0.8);
      padding: clamp(6px, 2vw, 8px) clamp(15px, 4vw, 20px);
      border-radius: 20px;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: bold;
      border: 1px solid #ff5500;
    }
    #ammo span { color: #ffaa00; }
    
    #godMode, #territoryMode {
      position: absolute;
      right: clamp(10px, 3vw, 20px);
      color: #0ff;
      background: rgba(0,0,0,0.8);
      padding: clamp(3px, 1vw, 6px) clamp(10px, 2vw, 15px);
      border-radius: 15px;
      font-size: clamp(10px, 2.5vw, 14px);
      font-weight: bold;
    }
    #godMode { top: clamp(40px, 10vw, 60px); border: 1px solid #0ff; }
    #territoryMode { top: clamp(70px, 18vw, 100px); border: 1px solid #f0f; color: #f0f; }
    
    #fps {
      position: absolute;
      top: clamp(5px, 2vw, 10px);
      right: clamp(5px, 2vw, 10px);
      color: #0f0;
      background: rgba(0,0,0,0.7);
      padding: 2px 8px;
      border-radius: 5px;
      font-size: clamp(10px, 2vw, 12px);
      font-family: monospace;
    }
    
    #peopleCount {
      position: absolute;
      top: clamp(100px, 26vw, 140px);
      right: clamp(10px, 3vw, 20px);
      color: #ff0;
      background: rgba(0,0,0,0.8);
      padding: clamp(3px, 1vw, 6px) clamp(10px, 2vw, 15px);
      border-radius: 15px;
      font-size: clamp(10px, 2.5vw, 14px);
      border: 1px solid #ff0;
    }
    
    #speedIndicator {
      position: absolute;
      bottom: clamp(60px, 15vw, 80px);
      right: clamp(15px, 4vw, 20px);
      color: #fff;
      background: rgba(0,0,0,0.7);
      padding: 2px 10px;
      border-radius: 10px;
      font-size: clamp(10px, 2vw, 12px);
    }
    
    .instruction {
      position: absolute;
      bottom: clamp(15px, 4vw, 20px);
      left: clamp(15px, 4vw, 20px);
      color: #aaa;
      background: rgba(0,0,0,0.7);
      padding: clamp(4px, 1.5vw, 6px) clamp(10px, 3vw, 15px);
      border-radius: 15px;
      font-size: clamp(8px, 2vw, 11px);
    }
    
    /* Кнопки меню */
    #menuToggleBtn {
      position: absolute;
      top: clamp(5px, 2vw, 10px);
      right: clamp(50px, 12vw, 60px);
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid #555;
      padding: clamp(4px, 1vw, 6px) clamp(8px, 2vw, 12px);
      border-radius: 20px;
      cursor: pointer;
      font-size: clamp(10px, 2.5vw, 14px);
      z-index: 300;
      display: none;
    }
    
    #pauseMenu {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 998;
      padding: 20px;
    }
    #pauseMenu h2 {
      color: #ff5500;
      font-size: clamp(24px, 6vw, 36px);
      margin-bottom: 20px;
    }
    
    #saveMsg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      background: rgba(0,0,0,0.9);
      padding: clamp(10px, 3vw, 15px) clamp(20px, 5vw, 30px);
      border-radius: 20px;
      font-size: clamp(16px, 4vw, 20px);
      z-index: 1001;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    /* Мобильные джойстики */
    #mobileControls {
      display: none;
      position: absolute;
      bottom: clamp(20px, 5vw, 30px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
    }
    
    #joystickArea {
      position: absolute;
      bottom: clamp(30px, 8vw, 50px);
      left: clamp(10px, 3vw, 20px);
      width: clamp(100px, 25vw, 140px);
      height: clamp(100px, 25vw, 140px);
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      z-index: 150;
    }
    
    #joystickThumb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(40px, 10vw, 60px);
      height: clamp(40px, 10vw, 60px);
      background: rgba(255,85,0,0.5);
      border-radius: 50%;
      border: 2px solid #ff5500;
      pointer-events: none;
    }
    
    #shootBtn {
      position: absolute;
      bottom: clamp(30px, 8vw, 50px);
      right: clamp(10px, 3vw, 20px);
      width: clamp(60px, 15vw, 80px);
      height: clamp(60px, 15vw, 80px);
      background: rgba(255,85,0,0.3);
      border-radius: 50%;
      border: 3px solid #ff5500;
      color: white;
      font-size: clamp(12px, 3vw, 16px);
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      -webkit-tap-highlight-color: transparent;
    }
    
    #shootBtn:active {
      background: rgba(255,85,0,0.7);
    }
    
    #jumpBtn {
      position: absolute;
      bottom: clamp(100px, 25vw, 140px);
      right: clamp(10px, 3vw, 20px);
      width: clamp(40px, 10vw, 50px);
      height: clamp(40px, 10vw, 50px);
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      font-size: clamp(16px, 4vw, 20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
    }
    
    #meteorBtn {
      position: absolute;
      top: clamp(160px, 40vw, 200px);
      right: clamp(10px, 3vw, 20px);
      width: clamp(40px, 10vw, 50px);
      height: clamp(40px, 10vw, 50px);
      background: rgba(255,68,0,0.3);
      border-radius: 50%;
      border: 2px solid #ff4400;
      color: white;
      font-size: clamp(16px, 4vw, 20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
    }
    
    #godBtn {
      position: absolute;
      top: clamp(5px, 2vw, 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,255,255,0.2);
      color: #0ff;
      border: 1px solid #0ff;
      padding: clamp(3px, 1vw, 5px) clamp(10px, 2vw, 15px);
      border-radius: 15px;
      font-size: clamp(10px, 2.5vw, 12px);
      cursor: pointer;
      z-index: 150;
      display: none;
    }
    
    /* Адаптивный чат */
    #chatContainer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 90%);
      max-height: min(320px, 50vh);
      background: rgba(0,0,0,0.92);
      border: 2px solid #ff5500;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      z-index: 200;
    }
    #chatMessages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      max-height: min(260px, 40vh);
      color: white;
      font-size: clamp(11px, 2.5vw, 13px);
    }
    #chatInputContainer { display: flex; border-top: 1px solid #ff5500; }
    #chatInput {
      flex: 1;
      padding: clamp(6px, 1.5vw, 8px);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: clamp(12px, 3vw, 14px);
      outline: none;
    }
    #chatSendBtn {
      padding: clamp(6px, 1.5vw, 8px) clamp(10px, 3vw, 15px);
      background: #ff5500;
      border: none;
      color: white;
      font-size: clamp(12px, 3vw, 14px);
      cursor: pointer;
    }
    .chat-message { margin-bottom: 5px; }
    .chat-message.player .name { color: #0f0; font-weight: bold; }
    .chat-message.npc .name { color: #ffaa00; font-weight: bold; }
    .chat-message.system .name { color: #ff5555; font-weight: bold; }
    #chatHint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff5500;
      background: rgba(0,0,0,0.7);
      padding: 4px 12px;
      border-radius: 10px;
      font-size: clamp(10px, 2vw, 12px);
    }
    
    /* Медиа-запросы */
    @media (max-width: 768px) {
      #mobileControls { display: block; }
      #joystickArea { display: block; }
      #shootBtn { display: flex; }
      #jumpBtn { display: flex; }
      #meteorBtn { display: flex; }
      #godBtn { display: block; }
      .instruction { display: none; }
      #chatHint { bottom: 80px; }
    }
    
    @media (min-width: 769px) {
      #mobileControls { display: none; }
      #joystickArea { display: none; }
      #shootBtn { display: none; }
      #jumpBtn { display: none; }
      #meteorBtn { display: none; }
      #godBtn { display: none; }
    }
  </style>
</head>
<body>
  <!-- Дисклеймер -->
  <div id="disclaimer">
    <div id="disclaimerBox">
      <h2>⚠️ ВНИМАНИЕ!</h2>
      <p>Эта игра содержит сцены насилия, взрывов и разрушений.</p>
      <p>Игра предназначена для лиц старше 16 лет.</p>
      <button class="menuBtn" id="acceptBtn">ПРИНЯТЬ</button>
    </div>
  </div>
  
  <!-- Меню -->
  <div id="mainMenu">
    <h1>💥 БАЗУКА 3D</h1>
    <p class="subtitle">Разрушай город, спавни людей, вызывай метеориты!</p>
    <button class="menuBtn" id="playBtn">🎮 ИГРАТЬ</button>
    <button class="menuBtn" id="continueBtn" disabled>▶️ ПРОДОЛЖИТЬ</button>
  </div>
  
  <button id="menuToggleBtn">⋮</button>
  
  <div id="pauseMenu">
    <h2>⏸️ ПАУЗА</h2>
    <button class="menuBtn" id="saveGameBtn">💾 СОХРАНИТЬ</button>
    <button class="menuBtn" id="resumeGameBtn">▶️ ИГРАТЬ</button>
    <button class="menuBtn" id="exitMenuBtn">🚪 ВЫЙТИ</button>
  </div>
  
  <div id="saveMsg">💾 СОХРАНЕНО!</div>
  
  <!-- Игровой интерфейс -->
  <div id="info"><b>💥 БАЗУКА</b></div>
  <div id="crosshair"><div class="cross-h"></div><div class="cross-v"></div><div class="cross-dot"></div></div>
  <div id="ammo">🚀 <span id="rocketCount">5</span>/5</div>
  <div id="godMode" style="display:none;">👑 БОГ</div>
  <div id="territoryMode" style="display:none;">⭐ ТЕРРИТОРИЯ</div>
  <div id="peopleCount" style="display:none;">👥 <span id="peopleValue">0</span></div>
  <div id="fps"><span id="fpsValue">0</span> FPS</div>
  <div id="speedIndicator" style="display:none;">⚡ <span id="speedValue">1x</span></div>
  <div id="chatHint">💬 P — чат</div>
  
  <!-- Мобильные контролы -->
  <div id="mobileControls">
    <div id="joystickArea">
      <div id="joystickThumb"></div>
    </div>
    <button id="shootBtn">🔫</button>
    <button id="jumpBtn">⬆️</button>
    <button id="meteorBtn">☄️</button>
    <button id="godBtn">👑</button>
  </div>
  
  <!-- Чат -->
  <div id="chatContainer">
    <div id="chatMessages"></div>
    <div id="chatInputContainer">
      <input type="text" id="chatInput" placeholder="Сообщение..." maxlength="150">
      <button id="chatSendBtn">→</button>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    
    // ========== ОПРЕДЕЛЕНИЕ УСТРОЙСТВА ==========
    const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
    
    // ========== ПЕРЕМЕННЫЕ ==========
    let gameActive = false, savedGameData = null;
    let godMode = false, territoryMode = false;
    let ammo = 5;
    const maxAmmo = 5;
    let yaw = 0, pitch = 0;
    
    // Мобильный джойстик
    let joystickActive = false;
    let joystickVector = { x: 0, y: 0 };
    let joystickId = null;
    
    // ========== СОХРАНЕНИЕ ==========
    function checkSaveFile() {
      const saved = localStorage.getItem('bazuka3d_save');
      const btn = document.getElementById('continueBtn');
      if (saved) {
        try {
          savedGameData = JSON.parse(saved);
          btn.disabled = false;
        } catch(e) {
          localStorage.removeItem('bazuka3d_save');
          savedGameData = null;
          btn.disabled = true;
        }
      } else {
        savedGameData = null;
        btn.disabled = true;
      }
    }
    
    function saveGame() {
      try {
        const data = {
          ammo, godMode, territoryMode,
          playerPos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
          playerRot: { yaw, pitch },
          buildings: buildings.map(b => ({ destroyed: b.destroyed, x: b.x, z: b.z })),
          timestamp: new Date().toISOString()
        };
        localStorage.setItem('bazuka3d_save', JSON.stringify(data));
        savedGameData = data;
        document.getElementById('continueBtn').disabled = false;
        const msg = document.getElementById('saveMsg');
        msg.style.opacity = '1';
        setTimeout(() => msg.style.opacity = '0', 2000);
      } catch(e) {
        alert('Ошибка сохранения!');
      }
    }
    
    function loadSaveData() {
      if (!savedGameData) return false;
      try {
        ammo = savedGameData.ammo || maxAmmo;
        godMode = savedGameData.godMode || false;
        territoryMode = savedGameData.territoryMode || false;
        if (savedGameData.playerPos) camera.position.set(savedGameData.playerPos.x, savedGameData.playerPos.y, savedGameData.playerPos.z);
        if (savedGameData.playerRot) { yaw = savedGameData.playerRot.yaw; pitch = savedGameData.playerRot.pitch; camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ')); }
        if (savedGameData.buildings) {
          savedGameData.buildings.forEach((sb, i) => {
            if (i < buildings.length) {
              buildings[i].destroyed = sb.destroyed;
              if (sb.destroyed) {
                buildings[i].mesh.material.color.setHex(0x444444);
                buildings[i].mesh.position.y = buildings[i].originalY - 0.4;
                buildings[i].mesh.scale.set(0.85, 0.7, 0.85);
              }
            }
          });
        }
        if (territoryMode) createPentagram(); else removePentagram();
        updateUI();
        return true;
      } catch(e) { return false; }
    }

    // ========== THREE.JS ==========
    const MAP_SIZE = 100, HALF_MAP = MAP_SIZE / 2;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, HALF_MAP*0.7, HALF_MAP*1.2);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, MAP_SIZE*2);
    camera.position.set(5, 1.7, 12);
    
    const renderer = new THREE.WebGLRenderer({ 
      antialias: !isMobile,
      powerPreference: isMobile ? "low-power" : "high-performance",
      precision: isMobile ? "lowp" : "mediump"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0x666666));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8);
    dl.position.set(HALF_MAP*0.3, HALF_MAP*0.4, HALF_MAP*0.2);
    scene.add(dl);

    let pentagram = null, pentagramRotation = 0;
    const gravity = -12;
    const rockets = [], meteors = [];
    
    function updateUI() {
      document.getElementById('rocketCount').textContent = (godMode||territoryMode)?'∞':ammo;
      document.getElementById('godMode').style.display = godMode?'block':'none';
      document.getElementById('territoryMode').style.display = territoryMode?'block':'none';
      document.getElementById('peopleCount').style.display = (godMode||territoryMode)?'block':'none';
      document.getElementById('peopleValue').textContent = people.filter(p=>p.alive).length;
      document.getElementById('speedIndicator').style.display = (godMode||territoryMode)?'block':'none';
      if(territoryMode){document.getElementById('speedValue').textContent='6x';document.getElementById('speedValue').style.color='#f0f';}
      else if(godMode){document.getElementById('speedValue').textContent='2x';document.getElementById('speedValue').style.color='#0ff';}
      else{document.getElementById('speedValue').textContent='1x';document.getElementById('speedValue').style.color='#fff';}
      if (isMobile) {
        document.getElementById('jumpBtn').style.display = godMode ? 'flex' : 'none';
        document.getElementById('godBtn').textContent = godMode ? '👑' : (territoryMode ? '⭐' : '👑');
      }
    }

    function createPentagram() {
      if(pentagram)scene.remove(pentagram);
      pentagram = new THREE.Group();
      const or=3,ir=1.2,pts=[];
      for(let i=0;i<5;i++){const oa=(i*72-90)*Math.PI/180,ia=((i*72+36)-90)*Math.PI/180;pts.push(new THREE.Vector3(Math.cos(oa)*or,0,Math.sin(oa)*or));pts.push(new THREE.Vector3(Math.cos(ia)*ir,0,Math.sin(ia)*ir));}
      for(let i=0;i<pts.length;i++){const n=(i+2)%pts.length,mid=new THREE.Vector3().addVectors(pts[i],pts[n]).multiplyScalar(0.5),d=new THREE.Vector3().subVectors(pts[n],pts[i]),l=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,d.length(),4),new THREE.MeshBasicMaterial({color:0xff00ff}));l.position.copy(mid);l.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.normalize());pentagram.add(l);}
      pentagram.position.y=0.05;scene.add(pentagram);
    }
    function removePentagram(){if(pentagram){scene.remove(pentagram);pentagram=null;}}
    function toggleTerritoryMode(){territoryMode=!territoryMode;if(territoryMode){godMode=false;createPentagram();camera.position.y=1.7;}else removePentagram();updateUI();}
    function toggleGodMode(){godMode=!godMode;if(godMode){territoryMode=false;removePentagram();}else{if(!territoryMode){camera.position.y=1.7;ammo=Math.min(ammo,maxAmmo);}}updateUI();}

    // Город
    const buildings=[],buildingData=[];
    function createBuilding(x,z,w,d,h,color,save=true){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d,isMobile?2:3,isMobile?2:3,isMobile?2:3),new THREE.MeshLambertMaterial({color}));m.position.set(x,h/2,z);scene.add(m);buildings.push({mesh:m,x,z,w,d,h,color,destroyed:false,originalY:h/2});if(save)buildingData.push({x,z,w,d,h,color});}
    const colors=[0x5a7d9c,0x4a6c8f,0x3a5a7a,0x6b8cae,0x2c4a6e,0x7e9bc2,0x4f6d8c,0x3d5a7d];
    const buildingCount = isMobile ? 120 : 260;
    for(let i=0;i<buildingCount*0.3;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*20,x=Math.cos(a)*r,z=Math.sin(a)*r;if(Math.sqrt((x-5)**2+(z-12)**2)<2.5)continue;createBuilding(x,z,1.5+Math.random()*3,1.5+Math.random()*3,3+Math.random()*8,colors[Math.floor(Math.random()*colors.length)]);}
    for(let i=0;i<buildingCount*0.45;i++){const a=Math.random()*Math.PI*2,r=20+Math.random()*28;createBuilding(Math.cos(a)*r,Math.sin(a)*r,1+Math.random()*2,1+Math.random()*2,1.5+Math.random()*4,colors[Math.floor(Math.random()*colors.length)]);}
    for(let i=0;i<buildingCount*0.25;i++){const a=Math.random()*Math.PI*2,r=40+Math.random()*10;createBuilding(Math.cos(a)*r,Math.sin(a)*r,1+Math.random()*1.5,1+Math.random()*1.5,1+Math.random()*3,colors[Math.floor(Math.random()*colors.length)]);}
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE,MAP_SIZE),new THREE.MeshLambertMaterial({color:0x333344})).rotateX(-Math.PI/2).translateY(-0.01));
    
    const crates=[];
    const crateCount = isMobile ? 25 : 50;
    for(let i=0;i<crateCount;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*45,s=0.5,m=new THREE.Mesh(new THREE.BoxGeometry(s,s,s),new THREE.MeshLambertMaterial({color:0x8b5a2b}));m.position.set(Math.cos(a)*r,s/2,Math.sin(a)*r);scene.add(m);crates.push({mesh:m,vel:new THREE.Vector3(),size:s});}

    const people=[];
    const peopleCount = isMobile ? 15 : 30;
    function createPerson(x,z){const g=new THREE.Group();g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.25,1.2,4),new THREE.MeshLambertMaterial({color:0x3355aa})).translateY(0.6));g.add(new THREE.Mesh(new THREE.SphereGeometry(0.2,4,4),new THREE.MeshLambertMaterial({color:0xffccaa})).translateY(1.3));g.position.set(x,0,z);scene.add(g);people.push({group:g,alive:true,health:100,moveTimer:Math.random()*3,vel:new THREE.Vector3()});}
    for(let i=0;i<peopleCount;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*45;createPerson(Math.cos(a)*r,Math.sin(a)*r);}
    
    function spawnPeople(n=1){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=2+Math.random()*5;createPerson(camera.position.x+Math.cos(a)*d,camera.position.z+Math.sin(a)*d);}updateUI();}
    function restoreAll(){
      buildings.forEach(b=>scene.remove(b.mesh));buildings.length=0;
      buildingData.forEach(d=>createBuilding(d.x,d.z,d.w,d.d,d.h,d.color,false));
      crates.forEach(c=>scene.remove(c.mesh));crates.length=0;
      for(let i=0;i<crateCount;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*45,s=0.5,m=new THREE.Mesh(new THREE.BoxGeometry(s,s,s),new THREE.MeshLambertMaterial({color:0x8b5a2b}));m.position.set(Math.cos(a)*r,s/2,Math.sin(a)*r);scene.add(m);crates.push({mesh:m,vel:new THREE.Vector3(),size:s});}
      people.forEach(p=>{if(p.group)scene.remove(p.group);});people.length=0;
      for(let i=0;i<peopleCount;i++){const a=Math.random()*Math.PI*2,r=3+Math.random()*45;createPerson(Math.cos(a)*r,Math.sin(a)*r);}
      updateUI();
    }

    const weaponGroup = new THREE.Group().translateX(0.35).translateY(-0.25).translateZ(-0.6);
    camera.add(weaponGroup);scene.add(camera);
    weaponGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.18,1,6),new THREE.MeshLambertMaterial({color:0x555555})).rotateX(Math.PI/2).translateZ(0.3));

    function createExplosion(pos,radius=4){
      const ar=territoryMode?radius*1.5:(godMode?radius*1.3:radius);
      const cnt=isMobile?Math.floor((territoryMode?8:(godMode?6:4))/2):(territoryMode?10:(godMode?8:5));
      const col=territoryMode?0xff00ff:(godMode?0x00ffff:0xff4400);
      for(let i=0;i<cnt;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(0.06,2,2),new THREE.MeshBasicMaterial({color:col}));p.position.copy(pos);p.userData={vel:new THREE.Vector3((Math.random()-0.5)*3,Math.random()*3+1,(Math.random()-0.5)*3),life:0.4};scene.add(p);const st=performance.now();(function anim(){const e=(performance.now()-st)/1000;if(e>p.userData.life){scene.remove(p);return;}p.position.x+=p.userData.vel.x*0.1;p.position.y+=p.userData.vel.y*0.1;p.position.z+=p.userData.vel.z*0.1;p.userData.vel.y-=0.25;p.scale.setScalar(1-e/p.userData.life);requestAnimationFrame(anim);})();}
      people.forEach(p=>{if(p.alive&&p.group.position.distanceTo(pos)<ar){p.health-=100;if(p.health<=0){p.alive=false;p.group.visible=false;}}});
      buildings.forEach(b=>{if(!b.destroyed&&Math.sqrt((b.x-pos.x)**2+(b.z-pos.z)**2)<ar*0.9){b.destroyed=true;b.mesh.material.color.setHex(0x444444);b.mesh.position.y-=0.4;b.mesh.scale.set(0.85,0.7,0.85);}});
      crates.forEach(c=>{const d=c.mesh.position.distanceTo(pos);if(d<ar+1.5){const dir=c.mesh.position.clone().sub(pos).normalize();c.vel.copy(dir.multiplyScalar(10));c.vel.y=5;}});
      updateUI();
    }

    function shoot(){
      if(!godMode&&!territoryMode&&ammo<=0)return;
      if(!godMode&&!territoryMode)ammo--;
      updateUI();
      const dir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      const pos=new THREE.Vector3(0,0,0.9);weaponGroup.localToWorld(pos);
      const mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,0.4,4),new THREE.MeshBasicMaterial({color:territoryMode?0xff00ff:(godMode?0x00ffff:0xff6600)}));
      mesh.position.copy(pos);scene.add(mesh);
      rockets.push({mesh,pos:pos.clone(),vel:dir.multiplyScalar(territoryMode?55:(godMode?40:30)),time:performance.now()});
    }

    function spawnMeteor(){
      const target=new THREE.Vector3(0,0,-25).applyQuaternion(camera.quaternion).add(camera.position);target.y=0;
      const start=new THREE.Vector3(target.x+(Math.random()-0.5)*12,50+Math.random()*15,target.z+(Math.random()-0.5)*12);
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(territoryMode?1.0:(godMode?0.7:0.6),4,4),new THREE.MeshBasicMaterial({color:territoryMode?0xff00ff:(godMode?0x00ffff:0xff4400)}));
      mesh.position.copy(start);scene.add(mesh);
      meteors.push({mesh,pos:start.clone(),target:target.clone(),vel:new THREE.Vector3(0,-20,0),time:performance.now(),explosionRadius:territoryMode?6:(godMode?5:7),speed:territoryMode?40:(godMode?30:25)});
    }

    // ========== УПРАВЛЕНИЕ ==========
    const keys={};
    window.addEventListener('keydown',e=>{
      if(chatOpen){if(e.code==='KeyP'||e.code==='Escape')closeChat();return;}
      keys[e.code]=true;
      if(e.code==='KeyR'&&!godMode&&!territoryMode){ammo=maxAmmo;updateUI();}
      if(e.code==='KeyG')toggleGodMode();
      if(e.code==='KeyH')toggleTerritoryMode();
      if(e.code==='KeyE')spawnMeteor();
      if(e.code==='KeyF'&&(godMode||territoryMode))spawnPeople(territoryMode?3:1);
      if(e.code==='KeyT')restoreAll();
      if(e.code==='KeyP')openChat();
    });
    window.addEventListener('keyup',e=>{keys[e.code]=false;});
    
    // Мышь
    renderer.domElement.addEventListener('click',()=>{
      if(!chatOpen&&gameActive&&document.getElementById('pauseMenu').style.display==='none'&&!isMobile)
        renderer.domElement.requestPointerLock();
    });
    document.addEventListener('mousemove',e=>{
      if(document.pointerLockElement===renderer.domElement){
        yaw-=e.movementX*0.002;pitch-=e.movementY*0.002;
        pitch=Math.max(-1.5,Math.min(1.5,pitch));
        camera.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
      }
    });
    renderer.domElement.addEventListener('mousedown',e=>{
      if(e.button===0&&document.pointerLockElement===renderer.domElement)shoot();
    });
    
    // Мобильное управление
    if (isMobile) {
      // Джойстик
      const joystickArea = document.getElementById('joystickArea');
      const joystickThumb = document.getElementById('joystickThumb');
      
      joystickArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        joystickActive = true;
        joystickId = e.changedTouches[0].identifier;
        updateJoystick(e.changedTouches[0]);
      });
      
      joystickArea.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === joystickId) {
            updateJoystick(e.changedTouches[i]);
          }
        }
      });
      
      joystickArea.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === joystickId) {
            joystickActive = false;
            joystickVector = { x: 0, y: 0 };
            joystickId = null;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
          }
        }
      });
      
      function updateJoystick(touch) {
        const rect = joystickArea.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const maxDist = rect.width / 2 - 20;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > maxDist) {
          dx = (dx / dist) * maxDist;
          dy = (dy / dist) * maxDist;
        }
        
        joystickVector = {
          x: dx / maxDist,
          y: dy / maxDist
        };
        
        joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }
      
      // Кнопка выстрела
      document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        shoot();
      });
      
      // Кнопка прыжка
      document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        keys.Space = true;
      });
      document.getElementById('jumpBtn').addEventListener('touchend', (e) => {
        e.preventDefault();
        keys.Space = false;
      });
      
      // Кнопка метеорита
      document.getElementById('meteorBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        spawnMeteor();
      });
      
      // Кнопка режима бога
      document.getElementById('godBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        toggleGodMode();
      });
      
      // Сенсорный обзор
      let touchStartX = 0, touchStartY = 0;
      renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.target === renderer.domElement) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }
      });
      
      renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.target === renderer.domElement || e.target === document.body) {
          const dx = e.touches[0].clientX - touchStartX;
          const dy = e.touches[0].clientY - touchStartY;
          yaw -= dx * 0.003;
          pitch -= dy * 0.003;
          pitch = Math.max(-1.5, Math.min(1.5, pitch));
          camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }
      });
    }

    // ========== КНОПКИ МЕНЮ ==========
    document.getElementById('acceptBtn').addEventListener('click', () => {
      document.getElementById('disclaimer').style.display = 'none';
      document.getElementById('mainMenu').style.display = 'flex';
      checkSaveFile();
    });
    
    document.getElementById('playBtn').addEventListener('click', () => {
      localStorage.removeItem('bazuka3d_save');
      savedGameData = null;
      document.getElementById('continueBtn').disabled = true;
      document.getElementById('mainMenu').style.display = 'none';
      document.getElementById('menuToggleBtn').style.display = 'block';
      gameActive = true;
      restoreAll();
      ammo = maxAmmo;
      godMode = false; territoryMode = false;
      removePentagram();
      camera.position.set(5, 1.7, 12);
      yaw = 0; pitch = 0;
      camera.quaternion.setFromEuler(new THREE.Euler(0, 0, 0, 'YXZ'));
      updateUI();
      if (!isMobile) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    });
    
    document.getElementById('continueBtn').addEventListener('click', () => {
      if (!savedGameData) return;
      document.getElementById('mainMenu').style.display = 'none';
      document.getElementById('menuToggleBtn').style.display = 'block';
      gameActive = true;
      if (loadSaveData()) {
        if (!isMobile) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
      } else {
        gameActive = false;
        document.getElementById('mainMenu').style.display = 'flex';
      }
    });
    
    document.getElementById('menuToggleBtn').addEventListener('click', () => {
      document.getElementById('pauseMenu').style.display = 'flex';
      if (!isMobile) document.exitPointerLock();
    });
    
    document.getElementById('saveGameBtn').addEventListener('click', saveGame);
    document.getElementById('resumeGameBtn').addEventListener('click', () => {
      document.getElementById('pauseMenu').style.display = 'none';
      if (gameActive && !isMobile) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    });
    document.getElementById('exitMenuBtn').addEventListener('click', () => {
      document.getElementById('pauseMenu').style.display = 'none';
      document.getElementById('menuToggleBtn').style.display = 'none';
      gameActive = false;
      document.getElementById('mainMenu').style.display = 'flex';
      checkSaveFile();
    });

    // ========== ИГРОВОЙ ЦИКЛ ==========
    let lt=performance.now(),fc=0,ft=0;
    function animate(){
      const now=performance.now(),dt=Math.min((now-lt)/1000,0.1);lt=now;
      fc++;ft+=dt;
      if(ft>=0.5){document.getElementById('fpsValue').textContent=Math.round(fc/ft);fc=0;ft=0;}
      
      if(territoryMode&&pentagram){pentagramRotation+=dt*2;pentagram.position.x=camera.position.x;pentagram.position.z=camera.position.z;pentagram.rotation.y=pentagramRotation;pentagram.scale.setScalar(1+Math.sin(now*0.005)*0.1);}
      
      if(gameActive&&document.getElementById('pauseMenu').style.display==='none'){
        const move=new THREE.Vector3();
        
        // Клавиатура или джойстик
        if (isMobile && joystickActive) {
          move.z = joystickVector.y;
          move.x = joystickVector.x;
        } else {
          if(keys.KeyW||keys.ArrowUp)move.z-=1;
          if(keys.KeyS||keys.ArrowDown)move.z+=1;
          if(keys.KeyA||keys.ArrowLeft)move.x-=1;
          if(keys.KeyD||keys.ArrowRight)move.x+=1;
        }
        
        if(godMode&&keys.Space)move.y+=1;
        if(godMode&&(keys.ShiftLeft||keys.ShiftRight))move.y-=1;
        
        if(move.length()>0){
          move.normalize();
          const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
          if(!godMode)fwd.y=0;fwd.normalize();
          const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
          if(!godMode)right.y=0;right.normalize();
          const sp=territoryMode?48:(godMode?20:8);
          camera.position.addScaledVector(fwd,-move.z*sp*dt);
          camera.position.addScaledVector(right,move.x*sp*dt);
          if(godMode)camera.position.y+=move.y*sp*dt;
        }
        
        if(!godMode)camera.position.y=1.7;
        camera.position.x=Math.max(-HALF_MAP+1,Math.min(HALF_MAP-1,camera.position.x));
        camera.position.z=Math.max(-HALF_MAP+1,Math.min(HALF_MAP-1,camera.position.z));
        if(godMode&&camera.position.y<0.5)camera.position.y=0.5;
        if(godMode&&camera.position.y>80)camera.position.y=80;
      }
      
      // Обновление ракет
      for(let i=rockets.length-1;i>=0;i--){
        const r=rockets[i];
        r.pos.addScaledVector(r.vel,dt);
        r.mesh.position.copy(r.pos);
        if(r.pos.y<0.1||performance.now()-r.time>6000||Math.abs(r.pos.x)>HALF_MAP||Math.abs(r.pos.z)>HALF_MAP){
          createExplosion(r.pos,4);scene.remove(r.mesh);rockets.splice(i,1);continue;
        }
        for(const b of buildings){
          if(b.destroyed)continue;
          if(Math.abs(r.pos.x-b.x)<b.w/2+0.3&&Math.abs(r.pos.z-b.z)<b.d/2+0.3&&r.pos.y<b.h){
            createExplosion(r.pos,4);scene.remove(r.mesh);rockets.splice(i,1);break;
          }
        }
      }
      
      // Обновление метеоритов
      for(let i=meteors.length-1;i>=0;i--){
        const m=meteors[i];
        m.vel.lerp(m.target.clone().sub(m.pos).normalize().multiplyScalar(m.speed),0.05);
        m.pos.addScaledVector(m.vel,dt);
        m.mesh.position.copy(m.pos);
        m.mesh.rotation.x+=dt*5;m.mesh.rotation.z+=dt*3;
        if(m.pos.y<0.5){createExplosion(new THREE.Vector3(m.pos.x,0.5,m.pos.z),m.explosionRadius);scene.remove(m.mesh);meteors.splice(i,1);continue;}
        let hit=false;
        for(const b of buildings){
          if(b.destroyed)continue;
          if(Math.abs(m.pos.x-b.x)<b.w/2+0.7&&Math.abs(m.pos.z-b.z)<b.d/2+0.7&&m.pos.y<b.h){
            createExplosion(new THREE.Vector3(m.pos.x,m.pos.y,m.pos.z),m.explosionRadius);scene.remove(m.mesh);meteors.splice(i,1);hit=true;break;
          }
        }
        if(hit)continue;
        if(performance.now()-m.time>10000||Math.abs(m.pos.x)>HALF_MAP||Math.abs(m.pos.z)>HALF_MAP){scene.remove(m.mesh);meteors.splice(i,1);}
      }
      
      crates.forEach(c=>{
        c.vel.y+=gravity*dt;
        c.mesh.position.x+=c.vel.x*dt;c.mesh.position.y+=c.vel.y*dt;c.mesh.position.z+=c.vel.z*dt;
        if(c.mesh.position.y<0.25){c.mesh.position.y=0.25;c.vel.y=0;c.vel.x*=0.8;c.vel.z*=0.8;}
      });
      
      people.forEach(p=>{
        if(!p.alive)return;
        p.moveTimer-=dt;
        if(p.moveTimer<=0){p.moveTimer=2+Math.random()*3;p.vel.x=(Math.random()-0.5)*2;p.vel.z=(Math.random()-0.5)*2;}
        p.group.position.x+=p.vel.x*dt;
        p.group.position.z+=p.vel.z*dt;
      });
      
      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    
    updateUI();
    animate();
    
    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    });
  </script>
</body>
</html>
